# Dev-only overrides (port and DB are in application.properties)
# In order-service/src/main/resources/application.yml, add:
spring:
  config:
    import: optional:configserver:http://localhost:8888
logging:
  level:
    com.ecommerce: DEBUG
    io.github.resilience4j: INFO

# Resilience4j Circuit Breaker configuration
resilience4j:
  circuitbreaker:
    instances:
      inventoryCheckCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        slidingWindowType: COUNT_BASED
      inventoryReserveCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        slidingWindowType: COUNT_BASED

# Micrometer / Zipkin tracing
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,circuitbreakerevents,metrics
