# Dev-only overrides (application.properties is the source of truth for Docker)
spring:
  application:
    name: order-service

  cloud:
    config:
      enabled: false
      import-check:
        enabled: false

logging:
  level:
    com.ecommerce.orderservice: DEBUG
    org.hibernate.SQL: DEBUG

kafka:
  bootstrap-servers: localhost:9092

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration