# Default values for ecommerce Helm chart
# Override these in values-prod.yaml or via --set flags

global:
  imageRegistry: ""
  imagePullSecrets: []

# Eureka Server
eurekaServer:
  image:
    repository: event-driven-ecommerce-eureka-server
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8761
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# API Gateway
apiGateway:
  image:
    repository: event-driven-ecommerce-api-gateway
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: LoadBalancer
    port: 8080
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Order Service
orderService:
  image:
    repository: event-driven-ecommerce-order-service
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8081
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Inventory Service
inventoryService:
  image:
    repository: event-driven-ecommerce-inventory-service
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8083
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Payment Service
paymentService:
  image:
    repository: event-driven-ecommerce-payment-service
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8084
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Shipping Service
shippingService:
  image:
    repository: event-driven-ecommerce-shipping-service
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8085
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Notification Service
notificationService:
  image:
    repository: event-driven-ecommerce-notification-service
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8086
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# PostgreSQL
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "15-alpine"
  auth:
    username: postgres
    password: postgres
    databases:
      - orderdb
      - inventorydb
      - paymentdb
      - shippingdb
      - notificationdb
  service:
    port: 5432
  persistence:
    enabled: true
    size: 5Gi

# Kafka
kafka:
  enabled: true
  image:
    repository: confluentinc/cp-kafka
    tag: "7.5.0"
  service:
    port: 9092
  zookeeper:
    enabled: true

# Zipkin
zipkin:
  enabled: true
  image:
    repository: openzipkin/zipkin
    tag: latest
  service:
    type: ClusterIP
    port: 9411
