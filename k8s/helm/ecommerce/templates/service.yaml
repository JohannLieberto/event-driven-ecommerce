apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-zookeeper
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  selector:
    app: zookeeper
  ports:
    - port: 2181
      targetPort: 2181
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-kafka
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  selector:
    app: postgres
  ports:
    - port: {{ .Values.postgres.service.port }}
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-eureka-server
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  selector:
    app: eureka-server
  ports:
    - port: {{ .Values.eurekaServer.service.port }}
      targetPort: 8761
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api-gateway
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  type: {{ .Values.apiGateway.service.type }}
  selector:
    app: api-gateway
  ports:
    - port: {{ .Values.apiGateway.service.port }}
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-order-service
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  selector:
    app: order-service
  ports:
    - port: {{ .Values.orderService.service.port }}
      targetPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-inventory-service
  labels:
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  selector:
    app: inventory-service
  ports:
    - port: {{ .Values.inventoryService.service.port }}
